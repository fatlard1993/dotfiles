allow_remote_control yes
listen_on unix:/tmp/kitty

shell_integration disabled

# With shell_integration disabled kitty can't tell an idle shell from a
# running program, so the default confirm_os_window_close (-1, "ask if
# something is running") degrades to always asking - which made super+w
# (bspc node -c via close-tab-or-window) look like it did nothing.
confirm_os_window_close 0
