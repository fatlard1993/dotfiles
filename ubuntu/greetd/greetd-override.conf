# See ubuntu/dot-update.d/greetd - installed to
# /etc/systemd/system/greetd.service.d/override.conf.
#
# setvtrgb needs root to open /dev/console (0600) and reprogram the VT
# palette - _greetd (config.toml's unprivileged user) can't, but this unit
# has no User= override, so it runs as root.
#
# -C /dev/tty7 targets vt7 explicitly (config.toml's [terminal] vt) rather
# than setvtrgb's default all-VTs sweep, which only reaches VTs already
# allocated. ExecStartPre alone didn't stick past a real reboot - greetd
# activating vt7 appears to re-init its console state, wiping the palette.
# So this runs twice: ExecStartPre (cheap, may help) and ExecStartPost
# after tuigreet has taken over vt7, followed by a SIGWINCH so crossterm
# treats it as a resize and force-redraws the whole screen in the
# corrected palette instead of only whatever it touches next on its own.
#
# setfont bumps the console font to Terminus 14x28 (from the 8x16 default,
# roughly doubling text size - no per-widget font control on a text
# console) with the same vt7 targeting and Pre+Post timing as setvtrgb.
#
# Every Exec line carries a leading "-" (systemd: ignore exit status).
# Without it, a failing ExecStartPre/Post fails the unit, and these race
# early boot (setfont/pkill can hit before the VT/tuigreet is ready) -
# warm reboots burned through StartLimitBurst=5 often enough to leave a
# dead greeter and a blank cursor at boot.
#
# ExecStartPost waits for the tuigreet process (up to 2s) instead of a
# fixed sleep, plus a 0.2s buffer after pgrep hits so tuigreet has
# attached to vt7 before the swap lands.
[Service]
ExecStartPre=-/usr/sbin/setvtrgb -C /dev/tty7 /etc/greetd/tomorrow-night.vtrgb
ExecStartPre=-/usr/bin/setfont -C /dev/tty7 /usr/share/consolefonts/Lat15-Terminus28x14.psf.gz
ExecStartPost=-/bin/sh -c 'for i in $(seq 20); do pgrep -x tuigreet >/dev/null && break; sleep 0.1; done; sleep 0.2; /usr/sbin/setvtrgb -C /dev/tty7 /etc/greetd/tomorrow-night.vtrgb; /usr/bin/setfont -C /dev/tty7 /usr/share/consolefonts/Lat15-Terminus28x14.psf.gz; pkill -WINCH tuigreet'
