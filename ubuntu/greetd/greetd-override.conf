# See ubuntu/dot-update.d/greetd - installed to
# /etc/systemd/system/greetd.service.d/override.conf.
#
# setvtrgb needs to open /dev/console directly (root-only, 0600) to
# reprogram the VT's 16-color palette - _greetd (the unprivileged user
# tuigreet itself runs as, see config.toml) can't do this, but greetd.service
# has no User= override of its own, so it runs as root and can.
#
# -C /dev/tty7 targets vt7 (config.toml's [terminal] vt) explicitly, rather
# than relying on setvtrgb's default "all virtual terminals" sweep, which
# only reaches VTs already allocated at the moment it runs. Tried running
# this in ExecStartPre alone first (before vt7 exists at all) - didn't
# stick, still showing stock colors after a real reboot. Best remaining
# theory: greetd activating/switching to vt7 re-initializes its console
# structure, wiping whatever palette was set before that activation
# happened. So this now runs twice: once in ExecStartPre (cheap, might help
# on some paths) and again in ExecStartPost after a short delay, timed to
# land after tuigreet has actually taken over vt7.
#
# A full 1s delay (tried first) let tuigreet draw several frames in stock
# colors before the swap landed, and whatever it didn't redraw afterward
# stayed stale - patchy/glitchy-looking. Shortened the delay so less gets
# drawn beforehand, and added a SIGWINCH to tuigreet right after: crossterm
# treats that as a resize event and forces a full redraw, so the whole
# screen repaints at once with the corrected palette instead of only the
# parts tuigreet happened to touch next on its own.
#
# setfont bumps the console font from the system default (8x16) to
# Terminus 14x28, roughly doubling text size across the whole greeter -
# there's no per-widget font control in a text console, one font covers
# everything tuigreet draws. Same -C /dev/tty7 targeting and belt-and-
# suspenders Pre+Post timing as setvtrgb, on the same theory that vt7
# activation may reset this too.
#
# Every Exec line carries a leading "-" (systemd: ignore this command's
# exit status). All of this is cosmetic, but without the "-" a failing
# ExecStartPre/Post fails the *unit*, and these commands race the early
# boot: setfont gets EINVAL from KDFONTOP if the VT isn't ready yet, and
# pkill exits 1 if tuigreet hasn't spawned within the old fixed 0.3s
# sleep. Each loss burned one of greetd.service's StartLimitBurst=5
# restarts; warm reboots (faster, warm caches) lost the race often enough
# to exhaust all 5, leaving a dead greeter and a bare blinking cursor at
# "boot". Cold boots were passing on attempt 5 of 5 - pure luck.
#
# ExecStartPost also now waits for the tuigreet process (up to 2s) instead
# of sleeping a fixed 0.3s, so the palette/font swap and SIGWINCH land
# reliably instead of silently missing when tuigreet is slow to spawn. The
# 0.2s after pgrep hits gives tuigreet a beat to actually attach to vt7
# before the swap - same "land after vt7 activation" reasoning as above.
[Service]
ExecStartPre=-/usr/sbin/setvtrgb -C /dev/tty7 /etc/greetd/tomorrow-night.vtrgb
ExecStartPre=-/usr/bin/setfont -C /dev/tty7 /usr/share/consolefonts/Lat15-Terminus28x14.psf.gz
ExecStartPost=-/bin/sh -c 'for i in $(seq 20); do pgrep -x tuigreet >/dev/null && break; sleep 0.1; done; sleep 0.2; /usr/sbin/setvtrgb -C /dev/tty7 /etc/greetd/tomorrow-night.vtrgb; /usr/bin/setfont -C /dev/tty7 /usr/share/consolefonts/Lat15-Terminus28x14.psf.gz; pkill -WINCH tuigreet'
