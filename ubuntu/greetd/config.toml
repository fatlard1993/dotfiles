# See ubuntu/dot-update.d/greetd - installed to /etc/greetd/config.toml.
#
# tuigreet's --theme takes hex colors, but the raw Linux console (TERM=linux,
# no compositor) can only display its fixed 16-slot palette. So --theme
# uses named ANSI colors here, and ExecStartPre/Post in the greetd.service
# override (ubuntu/greetd/greetd-override.conf) reprograms that palette to
# the Tomorrow Night values used elsewhere (ubuntu/greetd/tomorrow-night.vtrgb)
# before tuigreet draws a frame. Deviation from kitty's own palette: slot 0
# (black) is true #000000 here, not kitty's lighter #373b41 - that shade
# exists so black *text* reads against kitty's own black background, but
# nothing here uses black as foreground, and the VT's black slot doubles
# as the container background, where true black matches everything else.
#
# Gold/orange/green trio matches the rest of the desktop (polybar-metric's
# thresholds, slock's INPUT/successcolor, kitty's color3/color11/color10):
# lightyellow=gold #f0c674, yellow=orange #de935f, lightgreen=green #b5bd68.
# button is darkgray, not green - green read too close to input's white.
[terminal]
vt = 7

[default_session]
command = "tuigreet --remember --remember-session --time --asterisks --xsessions /usr/share/xsessions --theme 'text=gray;time=white;border=lightyellow;greet=lightgreen;prompt=lightyellow;input=white;action=darkgray;button=darkgray;container=black'"
user = "_greetd"
