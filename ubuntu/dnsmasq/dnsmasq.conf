listen-address=127.0.0.1
port=53
bind-interfaces
user=dnsmasq
group=dnsmasq
pid-file=/var/run/dnsmasq/dnsmasq.pid

no-poll
bogus-priv
neg-ttl=3600
cache-size=1000
dns-forward-max=150
domain-needed
resolv-file=/etc/resolv.personal
addn-hosts=/etc/hosts.adblock

# .home names live on the htpc's LAN dnsmasq (see profiles/htpc/dot-update.d/
# lan-names) - machines running this localhost resolver skip the router's
# DNS handout entirely, so without this split-forward they NXDOMAIN every
# house service name. The IP is deliberately static (see profiles/htpc/
# dot-update.d/static-ip). Away from home these queries just time out.
server=/home/192.168.1.151