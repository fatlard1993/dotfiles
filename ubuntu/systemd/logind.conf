[Login]
# Physical power button should open the rofi power menu, not act on its own
# (systemd's default is HandlePowerKey=poweroff) - ignore it here so the
# XF86PowerOff keypress reaches X11/sxhkd instead, which is bound to
# `polybar-menu power` (see profiles/tiny_lappy/.sxhkdrc).
HandlePowerKey=ignore
