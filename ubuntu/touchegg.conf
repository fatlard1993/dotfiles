<touchégg>

  <settings>
    <property name="animation_delay">150</property>
    <property name="action_execute_threshold">20</property>
    <property name="color">auto</property>
    <property name="borderColor">auto</property>
  </settings>

  <!--
    3-finger only (touchpad and touchscreen) - 4-finger touch recognition is
    meaningfully less reliable on a touchscreen than 3-finger, and desktop
    switching only needs one gesture pair. Left/right direction matches
    macOS's natural-scroll Spaces convention: swipe left -> next space
    slides in from the right, swipe right -> previous space.
  -->
  <application name="All">
    <gesture type="SWIPE" fingers="3" direction="LEFT">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Super_L</modifiers>
        <keys>period</keys>
        <on>begin</on>
      </action>
    </gesture>

    <gesture type="SWIPE" fingers="3" direction="RIGHT">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Super_L</modifiers>
        <keys>comma</keys>
        <on>begin</on>
      </action>
    </gesture>

    <gesture type="SWIPE" fingers="3" direction="UP">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Super_L</modifiers>
        <keys>Tab</keys>
        <on>begin</on>
      </action>
    </gesture>

    <gesture type="SWIPE" fingers="3" direction="DOWN">
      <action type="SEND_KEYS">
        <repeat>false</repeat>
        <modifiers>Super_L</modifiers>
        <keys>space</keys>
        <on>begin</on>
      </action>
    </gesture>

    <!--
      2-finger pinch, continuous (repeat=true, scales with gesture magnitude
      rather than firing once). ctrl+-/ctrl+= over an actual scroll-wheel
      event since touchegg has no MOUSE_WHEEL action type, and ctrl+-/= is
      the more universally-bound zoom shortcut anyway (browsers, VS Code,
      GIMP, image viewers, terminals).
    -->
    <gesture type="PINCH" fingers="2" direction="IN">
      <action type="SEND_KEYS">
        <repeat>true</repeat>
        <modifiers>Control_L</modifiers>
        <keys>minus</keys>
        <decreaseKeys>equal</decreaseKeys>
      </action>
    </gesture>

    <gesture type="PINCH" fingers="2" direction="OUT">
      <action type="SEND_KEYS">
        <repeat>true</repeat>
        <modifiers>Control_L</modifiers>
        <keys>equal</keys>
        <decreaseKeys>minus</decreaseKeys>
      </action>
    </gesture>
  </application>

</touchégg>
