# See ubuntu/dot-update.d/autorandr - installed to
# /etc/systemd/system/autorandr.service.d/override.conf.
#
# The package's udev rule (40-monitor-hotplug.rules) starts
# autorandr.service on *every* drm change event, and boot fires one per
# connector within a couple of seconds. The stock unit caps starts at
# StartLimitBurst=1 per 5s, so the first start wins and the rest get
# rejected with start-limit-hit - one red "Failed to start
# autorandr.service" line per rejection, painted straight onto tuigreet's
# VT (see ubuntu/dot-update.d/greetd for why console text reaches the
# greeter at all). Nothing is actually wrong: the unit is a oneshot, so an
# extra start of one that just ran is a no-op. Lifting the rate limit lets
# the redundant starts succeed quietly instead of manufacturing failures.
[Unit]
StartLimitIntervalSec=0
