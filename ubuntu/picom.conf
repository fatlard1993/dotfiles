# Shadow
shadow = true;
no-dnd-shadow = true;
no-dock-shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
# shadow-opacity = 0.7;
# shadow-red = 0.0;
# shadow-green = 0.0;
# shadow-blue = 0.0;
shadow-exclude = [
	"name = 'Notification'",
	"class_g = 'Conky'",
	"class_g ?= 'Notify-osd'",
	"class_g = 'Cairo-clock'",
	"_GTK_FRAME_EXTENTS"
];
# shadow-exclude = "n:e:Notification";
# shadow-exclude-reg = "x10+0+0";
# xinerama-shadow-crop = true;

# Opacity
# this multiplies the whole unfocused window - text included - and stacks
# with app-level background alpha (kitty background_opacity 0.9, the
# nautilus gtk-4.0/gtk.css surfaces), so keep it subtle: 0.8 here dropped
# unfocused backgrounds to a hard-to-read 0.72 combined
inactive-opacity = 0.95;
# active-opacity = 0.8;
frame-opacity = 0.7;
inactive-opacity-override = false;
alpha-step = 0.06;
# inactive-dim = 0.2;
# inactive-dim-fixed = true;
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 5;
# blur-background-frame = true;
# blur-background-fixed = true;
blur-background-exclude = [
	"window_type = 'dock'",
	"window_type = 'desktop'",
	"_GTK_FRAME_EXTENTS"
];
# opacity-rule = [ "80:class_g = 'URxvt'" ];

# Fading
fading = true;
# fade-delta = 30;
fade-in-step = 0.03;
fade-out-step = 0.03;
# no-fading-openclose = true;
# no-fading-destroyed-argb = true;
fade-exclude = [ ];

# Other
backend = "glx";
mark-wmwin-focused = true;
mark-ovredir-focused = true;
# use-ewmh-active-win = true;
detect-rounded-corners = true;
corner-radius = 6;
# polybar is a screen-edge-to-edge dock; rounding its corners just clips the
# bar's own content at the screen edge instead of looking intentional.
# True EWMH-fullscreen windows are excluded from rounding automatically by
# picom's legacy (non window-rules) behavior. single_monocle/borderless_monocle
# (bspwm.conf) make a lone window fill its whole desktop edge-to-edge too, but
# that's just a normal tiled window at monocle size, not EWMH fullscreen -
# picom's automatic exclusion doesn't cover it. bspwm reports border_width=0
# for these (verified), which is a reliable, generic way to catch them.
rounded-corners-exclude = [
	"window_type = 'dock'",
	"window_type = 'desktop'",
	"border_width = 0"
];
detect-client-opacity = true;
# vsync=false + backend=glx + unredir-if-possible is a known picom combo
# that leaves a stale GLX buffer on screen (frozen, showing the previous
# frame) after a fullscreen window (slock included) triggers an
# unredirect/redirect cycle - hits GPU-rendered apps like kitty hardest.
vsync = true;
dbe = false;
paint-on-overlay = true;
# sw-opti = true;
unredir-if-possible = true;
# unredir-if-possible-delay = 5000;
# unredir-if-possible-exclude = [ ];
focus-exclude = [ "class_g = 'Cairo-clock'" ];
detect-transient = true;
detect-client-leader = true;
invert-color-include = [ ];
# resize-damage = 1;

# GLX backend
# glx-no-stencil = true;
glx-copy-from-front = false;
# glx-use-copysubbuffermesa = true;
# glx-no-rebind-pixmap = true;
# glx-use-gpushader4 = true;
# xrender-sync = true;
# xrender-sync-fence = true;

# Window type settings
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; };
  popup_menu = { opacity = 0.8; };
  dropdown_menu = { opacity = 0.8; };
};

# A manual xrender-backend blur-kern used to live here; it routed the actual
# convolution work through the X server itself and pegged Xorg at 100% CPU,
# so it stayed permanently commented out. Now that backend is glx, blur uses
# the dual_kawase method above instead (GPU-accelerated, no CPU-pegging).
