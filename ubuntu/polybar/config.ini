; Tomorrow Night base16 palette, shared with kitty/rofi (see
; kitty.conf.d/theme.conf, ubuntu/rofi/theme.rasi)
[colors]
background = #000000
foreground = #e0e0e0
foreground-alt = #969896
primary = #f0c674
muted = #373b41
red = #cc6666
orange = #de935f
green = #b5bd68

[bar/main]
; MONITOR/BAR_DPI/BAR_HEIGHT are set per-instance by
; ubuntu/startup.d/status-bar (one polybar process per connected monitor -
; eDP-1 and an external display can have meaningfully different physical
; pixel density, e.g. this laptop panel measures ~248 DPI vs a 4K external
; at ~139 DPI, so a single hardcoded dpi would look wrong-sized on one of
; them). height has to scale proportionally with dpi too, not just stay
; fixed at the original 35px (tuned for the old hardcoded dpi=192) - dpi
; scales font rendering but not a bar's own configured height, so a higher
; computed dpi than 192 (as on eDP-1) clipped the now-taller text.
monitor = ${env:MONITOR}
width = 100%
height = ${env:BAR_HEIGHT:35}
radius = 0
fixed-center = true
dpi = ${env:BAR_DPI:96}

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
padding-left = 1
padding-right = 1
module-margin = 1

font-0 = "Hack Nerd Font Mono:size=12;2"
font-1 = "Hack Nerd Font Mono:size=15;4"

modules-left = bspwm
modules-center = datetime
; env-overridable so a profile's startup.d/status-bar shadow can reshape the
; bar for its machine (see profiles/htpc/startup.d/status-bar: adds the
; slideshow button, drops battery/brightness) without forking this config
modules-right = ${env:POLYBAR_MODULES_RIGHT:terminal wallpaper brightness clipboard disk volume cpu temp ram battery network bluetooth power}

cursor-click = pointer
enable-ipc = true

[module/bspwm]
type = internal/bspwm

label-focused = %name%
label-focused-background = ${colors.primary}
label-focused-foreground = #000000
label-focused-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

[module/datetime]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-datetime
interval = 1
click-left = date '+%Y-%m-%d %H:%M:%S' | xclip -selection clipboard; notify-send "Date & Time" "Copied to clipboard"
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu datetime &

[module/disk]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric disk
interval = 25
click-left = nautilus &
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu disk &

[module/volume]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric volume
interval = 2
click-left = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu volume &
scroll-up = $HOME/.dotfiles/ubuntu/bin/volume up
scroll-down = $HOME/.dotfiles/ubuntu/bin/volume down

[module/cpu]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric cpu
interval = 2
click-left = $HOME/.dotfiles/ubuntu/bin/polybar-menu cpu &
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu cpu &

[module/temp]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric temp
interval = 5
click-left = $HOME/.dotfiles/ubuntu/bin/polybar-menu temp &
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu temp &

[module/ram]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric ram
interval = 2
click-left = $HOME/.dotfiles/ubuntu/bin/polybar-menu ram &
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu ram &

[module/battery]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric battery
interval = 5
; plain click opens the menu (same as right-click), shift+click toggles
; power-saver (see battery-click)
click-left = $HOME/.dotfiles/ubuntu/bin/battery-click
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu battery &

[module/network]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric network
interval = 5
click-left = notify-send "Network" "$(nmcli -t -f active,ssid dev wifi | awk -F: '$1=="yes"{print $2}') | $(ip -4 -o addr show wlan0 | awk '{print $4}' | cut -d/ -f1)"
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu network &

[module/bluetooth]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric bluetooth
interval = 5
click-left = current=$(bluetoothctl show | awk -F': ' '/Powered:/ {print $2}'); if [ "$current" = "yes" ]; then bluetoothctl power off; notify-send "Bluetooth" "Disabled"; else bluetoothctl power on; notify-send "Bluetooth" "Enabled"; fi
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu bluetooth &

[module/wallpaper]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric wallpaper
interval = 2
; plain click rotates, shift+click deletes & blacklists (see wallpaper-click)
click-left = $HOME/.dotfiles/ubuntu/bin/wallpaper-click
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu wallpaper &

[module/brightness]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric brightness
interval = 2
click-left = $HOME/.dotfiles/ubuntu/bin/brightness-click
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu brightness &
scroll-up = $HOME/.dotfiles/ubuntu/bin/brightness screen up 5
scroll-down = $HOME/.dotfiles/ubuntu/bin/brightness screen down 5

; static button; toggles the quake terminal (drops it at the focused app's
; cwd, same as the sxhkd binding - see ubuntu/bin/terminal-smart)
[module/terminal]
type = custom/script
exec = echo 
interval = 3600
format-foreground = ${colors.green}
click-left = $HOME/.dotfiles/ubuntu/bin/terminal-smart &

[module/clipboard]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric clipboard
interval = 2
click-left = rofi -modi "clipboard:greenclip print" -show clipboard -run-command '{cmd}'
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu clipboard &

[module/power]
type = custom/script
exec = $HOME/.dotfiles/ubuntu/bin/polybar-metric power
interval = 2
click-left = system-lock &
click-right = $HOME/.dotfiles/ubuntu/bin/polybar-menu power &

; static button, not in the default modules-right list - opted into by the
; htpc (see profiles/htpc/startup.d/status-bar), where big picture is the
; box's primary interface. steam://open/bigpicture covers both worlds: it
; pulls a running steam back into big picture, and cold-launches straight
; into it when steam isn't up (e.g. it was quit from the bar's power menu).
[module/steam]
type = custom/script
exec = echo 
interval = 3600
format-foreground = ${colors.primary}
click-left = steam steam://open/bigpicture &

; static button, htpc-opted like steam above - the box's "full pc" mode is
; driven from the couch via phone (htpc-remote), so app launching needs to
; be clickable, not keyboard-first like the other machines.
[module/chrome]
type = custom/script
exec = echo 
interval = 3600
format-foreground = ${colors.orange}
click-left = google-chrome &

; static button, not in the default modules-right list - opted into by
; profiles that keep photos locally (see POLYBAR_MODULES_RIGHT above);
; click toggles a fullscreen shuffled slideshow (see ubuntu/bin/slideshow)
[module/slideshow]
type = custom/script
exec = echo 󰋩
interval = 3600
click-left = $HOME/.dotfiles/ubuntu/bin/slideshow &
