# Ctrl<->Alt swap for every keyboard, applied at device-add so hotplugged
# externals get it too - ~/.Xmodmap only patches keyboards present at
# login, which left plugged-in keyboards with stock Ctrl/Alt and broke
# the super+ctrl chord family from them.

Section "InputClass"
	Identifier "Ctrl-Alt swap"
	MatchIsKeyboard "true"

	Option "XkbOptions" "ctrl:swap_lalt_lctl,ctrl:swap_ralt_rctl"
EndSection
