# Bluetooth re-pairing re-enumerates the MX Master and resets libinput
# props to defaults; an InputClass applies on every device-add, where a
# startup.d script only runs at login.

Section "InputClass"
	Identifier "MX Master natural scrolling"
	MatchProduct "MX Master 4"
	MatchIsPointer "true"

	Option "NaturalScrolling" "true"
EndSection
