# Linked to ~/.config/pipewire/pipewire.conf.d/ by dot-update.d/audio.
#
# One virtual "All Outputs" sink that mirrors playback to every physical
# ALSA sink at once - on this box: HDMI to the AV receiver (surround) and
# the headphone jack feeding the whole-house zone amp. Matching on
# alsa_output.* rather than concrete card names keeps this portable across
# hardware reshuffles (and is also what stops the combine sink from trying
# to swallow itself).
#
# 5.1 layout so surround content reaches the receiver intact when the HDMI
# card profile is surround-capable; PipeWire's channelmix downmixes to
# stereo automatically for the analog jack (and for HDMI too if its profile
# is only stereo - no worse than a stereo combine in that case). Selecting
# the surround HDMI profile itself is a one-time on-box step - see the note
# in startup.d/audio.
#
# latency-compensate stays off: it aligns reported latencies at the cost
# of added buffering, and only the receiver path is lip-sync-critical -
# small drift between it and the house zones doesn't matter.
context.modules = [
    {   name = libpipewire-module-combine-stream
        args = {
            combine.mode = sink
            node.name = "combine_sink"
            node.description = "All Outputs"
            combine.latency-compensate = false
            combine.props = {
                audio.position = [ FL FR FC LFE RL RR ]
            }
            stream.props = { }
            stream.rules = [
                {   matches = [
                        {   media.class = "Audio/Sink"
                            node.name = "~alsa_output.*"
                        }
                    ]
                    actions = { create-stream = { } }
                }
            ]
        }
    }
]
