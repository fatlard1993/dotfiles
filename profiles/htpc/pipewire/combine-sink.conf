# Linked to ~/.config/pipewire/pipewire.conf.d/ by dot-update.d/audio.
#
# One virtual "All Outputs" sink mirroring playback to every physical ALSA
# sink: HDMI to the AV receiver (surround) and the headphone jack feeding
# the whole-house zone amp. Matches alsa_output.* rather than concrete
# card names - portable across hardware reshuffles, and stops the combine
# sink from swallowing itself.
#
# 5.1 layout so surround content reaches the receiver intact when the HDMI
# profile is surround-capable; PipeWire downmixes to stereo automatically
# for the analog jack (and for HDMI if its profile is stereo-only).
# Selecting the surround HDMI profile is a one-time step - see
# startup.d/audio.
#
# latency-compensate stays off: it trades added buffering for aligned
# latencies, and only the receiver path is lip-sync-critical - drift
# against the house zones doesn't matter.
context.modules = [
    {   name = libpipewire-module-combine-stream
        args = {
            combine.mode = sink
            node.name = "combine_sink"
            node.description = "All Outputs"
            combine.latency-compensate = false
            combine.props = {
                audio.position = [ FL FR FC LFE RL RR ]
            }
            stream.props = { }
            stream.rules = [
                {   matches = [
                        {   media.class = "Audio/Sink"
                            node.name = "~alsa_output.*"
                        }
                    ]
                    actions = { create-stream = { } }
                }
            ]
        }
    }
]
