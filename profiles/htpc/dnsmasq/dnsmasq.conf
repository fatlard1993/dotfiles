# Linked to /etc/dnsmasq.conf by dot-update.d/dnsmasq-lan, replacing the
# shared localhost-only ubuntu/dnsmasq/dnsmasq.conf that the shared setup
# (ubuntu/dot-update.d/dnsmasq) installs first - same resolver, same
# blocklist, promoted to serve the whole house pi-hole-style. Point the
# router's DHCP DNS option at this box (give it a DHCP reservation on the
# router while there - a DNS server needs a stable IP) and every device on
# the LAN gets the adblocking for free.
#
# The two lines this deliberately does NOT carry over from the shared
# config are listen-address=127.0.0.1 and bind-interfaces: with no
# listen/bind restrictions dnsmasq answers on every interface.
# local-service is the guard that replaces them - it refuses queries that
# don't originate from a directly-attached subnet.
port=53
local-service
user=dnsmasq
group=dnsmasq
pid-file=/var/run/dnsmasq/dnsmasq.pid

no-poll
bogus-priv
neg-ttl=3600
# sized for every device in the house, not one machine (the shared config
# uses 1000)
cache-size=10000
dns-forward-max=150
domain-needed
resolv-file=/etc/resolv.personal
addn-hosts=/etc/hosts.adblock
