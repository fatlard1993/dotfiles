# Linked to /etc/dnsmasq.conf by dot-update.d/dnsmasq-lan, replacing the
# shared localhost-only ubuntu/dnsmasq/dnsmasq.conf - same resolver, same
# blocklist, promoted to serve the whole house pi-hole-style. Point the
# router's DHCP DNS option at this box (give it a DHCP reservation, since
# a DNS server needs a stable IP) and every device on the LAN gets
# adblocking for free.
#
# Deliberately drops the shared config's listen-address=127.0.0.1 and
# bind-interfaces (so dnsmasq answers on every interface) - local-service
# replaces them, refusing queries not from a directly-attached subnet.
port=53
local-service
user=dnsmasq
group=dnsmasq
pid-file=/var/run/dnsmasq/dnsmasq.pid

no-poll
bogus-priv
neg-ttl=3600
# sized for every device in the house, not one machine (the shared config
# uses 1000)
cache-size=10000
dns-forward-max=150
domain-needed
resolv-file=/etc/resolv.personal
addn-hosts=/etc/hosts.adblock
